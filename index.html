<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nikita ❤️</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-y: auto;

    /* 🔥 BACKGROUND IMAGE */
    background: url('file_00000000d1dc720886a68383aa6016ef.png') no-repeat center center fixed;
    background-size: cover;
}

/* 🌑 Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* 🔐 Lock Screen */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#lockScreen input {
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    width: 250px;
    text-align: center;
}

#lockScreen button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: pink;
}

/* 🎬 Intro */
#intro {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* 🖼️ Photo */
.photo {
    width: 230px;
    border-radius: 20px;
    box-shadow: 0 0 30px pink;
    animation: zoom 3s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

/* Main */
#main {
    display: none;
    padding: 20px;
    max-width: 700px;
    margin: auto;
}

h1 {
    font-size: 40px;
    background: linear-gradient(45deg, red, yellow, cyan);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    font-size: 18px;
    line-height: 1.7;
    text-shadow: 0 0 10px pink;
}

.proposal {
    font-size: 24px;
    color: yellow;
}

/* Buttons */
.btn {
    margin: 10px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    font-size: 18px;
}

.yes { background: green; color:white; }
.no { background: red; color:white; position:absolute; }

/* ❤️ Hearts */
.heart {
    position: fixed;
    top:-10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* 💍 Popup */
#popup {
    display:none;
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:pink;
    padding:30px;
    border-radius:20px;
}

/* Cursor */
.cursor {
    border-right: 2px solid white;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { border-color: transparent; } }
</style>
</head>

<body>

<!-- 🔐 Lock -->
<div id="lockScreen">
    <h2>Enter Secret Code ❤️</h2>
    <input type="text" id="password">
    <button onclick="checkPassword()">Unlock 💖</button>
    <p id="error"></p>
</div>

<!-- 🎬 Intro -->
<div id="intro">
    <img src="file_00000000d1dc720886a68383aa6016ef.png" class="photo">
    <h2>💖 Special Surprise For You 💖</h2>
    <button onclick="start()">Start ❤️</button>
</div>

<!-- 🎵 Music -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<!-- Main -->
<div id="main">
<h1>My Dear Nikita ❤️</h1>
<h2>Happy Birthday meri jaan 🎂❤️</h2>

<p id="text" class="cursor"></p>

<div id="afterText" style="display:none;">

<p class="proposal">
Nikita, kya tum meri wife banogi? 💍
</p>

<button class="btn yes" onclick="yes()">YES ❤️</button>
<button class="btn no" id="noBtn">NO 😢</button>

</div>
</div>

<div id="popup">💍 She said YES ❤️</div>

<script>
// 🔐 Password
function checkPassword(){
 let v=document.getElementById("password").value.toLowerCase().trim();
 if(v==="i love you mera aadmi"){
  document.getElementById("lockScreen").style.display="none";
  document.getElementById("intro").style.display="flex";
 } else {
  document.getElementById("error").innerText="Wrong code";
 }
}

// 🎬 Start
function start(){
 document.getElementById("intro").style.display="none";
 document.getElementById("main").style.display="block";
 document.getElementById("music").play();
 typeWriter();
}

// ✍️ Text
let text = `My Dear Nikita,

Happy Birthday meri jaan 🎂❤️

Aaj ka din mere liye bahut khaas hai... (same letter continue kar sakta hai tu yaha)`;

let i = 0;
function typeWriter(){
 if(i < text.length){
  document.getElementById("text").innerHTML += text.charAt(i);
  i++;
  setTimeout(typeWriter, 25);
 } else {
  document.getElementById("afterText").style.display="block";
 }
}

// ❤️ Hearts
setInterval(()=>{
 let h=document.createElement("div");
 h.innerHTML="❤️";
 h.className="heart";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),5000);
},300);

// 💍 YES
function yes(){
 document.getElementById("popup").style.display="block";
}

// 😂 NO move
let noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
 noBtn.style.left=Math.random()*80+"vw";
 noBtn.style.top=Math.random()*80+"vh";
});
</script>

</body>
</html>
