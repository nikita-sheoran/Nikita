<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nikita ❤️</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-y: auto;

    background: url('file_00000000d1dc720886a68383aa6016ef.png') no-repeat center center fixed;
    background-size: cover;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Lock */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#lockScreen input {
    padding: 12px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    width: 250px;
    text-align: center;
}

#lockScreen button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: pink;
}

/* Intro */
#intro {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.photo {
    width: 230px;
    border-radius: 20px;
    box-shadow: 0 0 30px pink;
}

/* Main */
#main {
    display: none;
    padding: 20px;
    max-width: 700px;
    margin: auto;
}

h1 {
    font-size: 40px;
    background: linear-gradient(45deg, red, yellow, cyan);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2 {
    color: pink;
}

p {
    font-size: 18px;
    line-height: 1.7;
    text-shadow: 0 0 10px pink;
}

/* Typing cursor */
.cursor {
    border-right: 2px solid white;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { border-color: transparent; } }

/* Floating hearts */
.heart {
    position: fixed;
    top:-10px;
    animation: fall linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- 🔐 Lock -->
<div id="lockScreen">
    <h2>Enter Secret Code ❤️</h2>
    <input type="text" id="password" placeholder="Type here...">
    <button onclick="checkPassword()">Unlock 💖</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- Intro -->
<div id="intro">
    <img src="file_00000000d1dc720886a68383aa6016ef.png" class="photo">
    <h2>💖 Special Surprise For You 💖</h2>
    <button onclick="start()">Start ❤️</button>
</div>

<!-- Music -->
<audio id="music" loop>
<source src="Trim_AUD-20260318-WA0000_1.m4a">
</audio>

<!-- Main -->
<div id="main">
<h1>My Dear Nikita ❤️</h1>
<h2>Happy Birthday meri jaan 🎂❤️</h2>

<p id="text" class="cursor"></p>

<p style="margin-top:20px;">
I love you more than words can ever explain ❤️<br><br>
Hamesha tumhara,<br>
Mukesh
</p>

</div>

<script>
// Password + music start
function checkPassword(){
 let v=document.getElementById("password").value.toLowerCase().trim();
 if(v==="i love you mera aadmi 1"){
  document.getElementById("music").play().catch(()=>{});
  document.getElementById("lockScreen").style.display="none";
  document.getElementById("intro").style.display="flex";
 } else {
  document.getElementById("error").innerText="Wrong code 😢";
 }
}

// Start
function start(){
 document.getElementById("intro").style.display="none";
 document.getElementById("main").style.display="block";
 typeWriter();
}

// Full letter
let text = `My Dear Nikita,

Happy Birthday meri jaan 🎂❤️

Aaj ka din mere liye bahut hi khaas hai, kyunki aaj woh din hai jab meri zindagi ki sabse khoobsurat aur sabse important insaan is duniya me aayi thi. Main dil se shukr guzar hoon ki tum meri life ka hissa ho. Jab se tum meri zindagi me aayi ho, tab se meri duniya hi badal gayi hai. Pehle zindagi bas chal rahi thi, lekin tumhare aane ke baad zindagi jeene ka asli matlab samajh aaya.

Tumhari muskaan meri sabse badi khushi hai. Tumhari awaaz mere liye sukoon hai. Jab bhi main thak jata hoon ya pareshan hota hoon, bas tumhare baare me soch kar hi sab kuch theek lagne lagta hai. Tum meri zindagi ka woh hissa ban chuki ho jiske bina main apne kal ke baare me soch bhi nahi sakta.

Nikita, hamara rishta shayad shabdon me samjhana mushkil hai, lekin mere dil me tumhari jagah bilkul ek wife jaisi hi hai. Tum mere liye sirf ek saathi nahi ho, balki meri aadat ho, meri khushi ho aur meri poori duniya ho. Main jab bhi apna future sochta hoon to usme har jagah sirf tum hi nazar aati ho.

Main tumhare saath har khushi baantna chahta hoon, har mushkil me tumhara haath pakad kar chalna chahta hoon. Main chahta hoon ki jab zindagi me koi accha pal aaye to sabse pehle tumhare saath share karu, aur jab koi mushkil aaye to hum dono milkar uska saamna karein.

Aaj tumhare birthday ke is khoobsurat din par main tumse dil ki ek baat kehna chahta hoon. Yeh sirf ek sawal nahi hai, balki meri poori zindagi ka sapna hai.

Main wada karta hoon ki main hamesha tumhari respect karunga, tumhe samjhunga, tumhara saath kabhi nahi chhodunga. Zindagi me chahe kitni bhi mushkilein aaye, main hamesha tumhare saath khada rahunga. Main tumhe hamesha khush rakhne ki puri koshish karunga, kyunki tumhari khushi hi meri sabse badi khushi hai.

Happy Birthday once again meri jaan. Aaj ka din tumhare liye utna hi special ho jitni tum meri zindagi me special ho.`;

let i = 0;
function typeWriter(){
 if(i < text.length){
  document.getElementById("text").innerHTML += text.charAt(i);
  i++;
  setTimeout(typeWriter, 25);
 } else {
  document.getElementById("text").classList.remove("cursor");
 }
}

// Hearts
setInterval(()=>{
 let h=document.createElement("div");
 h.innerHTML="❤️";
 h.className="heart";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),5000);
},300);
</script>

</body>
</html>
