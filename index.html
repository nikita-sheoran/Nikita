<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nikita ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #fff;
    text-align: center;
    overflow-x: hidden;
}

.container {
    max-width: 750px;
    margin: auto;
    padding: 30px;
}

h1 { font-size: 36px; }
p { font-size: 18px; line-height: 1.6; }

.proposal {
    margin-top: 30px;
    font-size: 22px;
    font-weight: bold;
    color: #ffe600;
}

.btn {
    margin: 10px;
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
}

.yes { background: #28a745; color: white; }
.no { background: #dc3545; color: white; position: absolute; }

/* ❤️ Falling hearts */
.heart {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(0); }
    100% { transform: translateY(100vh); }
}

/* 💍 Popup */
#popup {
    display: none;
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ff4b5c;
    padding: 30px;
    border-radius: 20px;
    font-size: 22px;
}

/* typing cursor */
.cursor {
    border-right: 2px solid white;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}
</style>
</head>

<body>

<!-- 🎵 Music -->
<audio id="music" loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<div class="container">
    <h1>My Dear Nikita ❤️</h1>
    <h2>Happy Birthday meri jaan 🎂❤️</h2>

    <!-- Typing Text -->
    <p id="text" class="cursor"></p>

    <div id="afterText" style="display:none;">

        <p class="proposal">
        Nikita, kya tum hamesha ke liye meri zindagi ka hissa banogi? 💍 <br>
        Kya tum meri wife banogi?
        </p>

        <button class="btn yes" onclick="sayYes()">YES ❤️</button>
        <button class="btn no" id="noBtn">NO 😢</button>

        <br><br>
        <button class="btn" onclick="playMusic()">🎵 Play Music</button>

        <p style="margin-top:30px;">
        I love you more than words can ever explain ❤️
        </p>

        <h3>Hamesha tumhara,<br>Mukesh</h3>

    </div>
</div>

<div id="popup">Yayyyy ❤️ Tum meri ho 💍</div>

<script>
// ❤️ Falling hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);

// 💍 YES
function sayYes() {
    document.getElementById("popup").style.display = "block";
}

// 😂 NO bhaagega
let noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random() * 80 + "vw";
    noBtn.style.top = Math.random() * 80 + "vh";
});

// 🎵 Music
function playMusic() {
    document.getElementById("music").play();
}

// ✍️ Typing Animation (FULL LETTER)
let text = `Aaj ka din mere liye bahut hi khaas hai, kyunki aaj woh din hai jab meri zindagi ki sabse khoobsurat aur sabse important insaan is duniya me aayi thi. Main dil se shukr guzar hoon ki tum meri life ka hissa ho. Jab se tum meri zindagi me aayi ho, tab se meri duniya hi badal gayi hai. Pehle zindagi bas chal rahi thi, lekin tumhare aane ke baad zindagi jeene ka asli matlab samajh aaya.

Tumhari muskaan meri sabse badi khushi hai. Tumhari awaaz mere liye sukoon hai. Jab bhi main thak jata hoon ya pareshan hota hoon, bas tumhare baare me soch kar hi sab kuch theek lagne lagta hai. Tum meri zindagi ka woh hissa ban chuki ho jiske bina main apne kal ke baare me soch bhi nahi sakta.

Nikita, hamara rishta shayad shabdon me samjhana mushkil hai, lekin mere dil me tumhari jagah bilkul ek wife jaisi hi hai. Tum mere liye sirf ek saathi nahi ho, balki meri aadat ho, meri khushi ho aur meri poori duniya ho. Main jab bhi apna future sochta hoon to usme har jagah sirf tum hi nazar aati ho.

Main tumhare saath har khushi baantna chahta hoon, har mushkil me tumhara haath pakad kar chalna chahta hoon. Main chahta hoon ki jab zindagi me koi accha pal aaye to sabse pehle tumhare saath share karu, aur jab koi mushkil aaye to hum dono milkar uska saamna karein.

Aaj tumhare birthday ke is khoobsurat din par main tumse dil ki ek baat kehna chahta hoon. Yeh sirf ek sawal nahi hai, balki meri poori zindagi ka sapna hai.

Main wada karta hoon ki main hamesha tumhari respect karunga, tumhe samjhunga, tumhara saath kabhi nahi chhodunga. Zindagi me chahe kitni bhi mushkilein aaye, main hamesha tumhare saath khada rahunga. Main tumhe hamesha khush rakhne ki puri koshish karunga, kyunki tumhari khushi hi meri sabse badi khushi hai.

Happy Birthday once again meri jaan. Aaj ka din tumhare liye utna hi special ho jitni tum meri zindagi me special ho.`;

let i = 0;
let speed = 30;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    } else {
        document.getElementById("afterText").style.display = "block";
        document.getElementById("text").classList.remove("cursor");
    }
}

typeWriter();
</script>

</body>
</html>
